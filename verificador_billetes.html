<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Fantasia — Verificador de Billetes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600&display=swap');

  :root {
    --dark: #1a1d1f;
    --mid: #495055;
    --green: #82A938;
    --green-bright: #a2d44a;
    --green-dim: #5c7c28;
    --white: #e8ecf0;
    --invalid: #e04444;
    --valid: #82A938;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0f10;
    color: var(--white);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(130,169,56,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(130,169,56,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 520px;
    padding: 2rem 1.5rem;
    position: relative;
    z-index: 1;
  }

  .logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 2.5rem;
  }

  .logo-wrap img {
    width: 260px;
    filter: drop-shadow(0 0 20px rgba(130,169,56,0.3));
  }

  .card {
    background: linear-gradient(135deg, rgba(73,80,85,0.25) 0%, rgba(30,34,37,0.6) 100%);
    border: 1px solid rgba(130,169,56,0.2);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(130,169,56,0.05);
  }

  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 1rem;
    opacity: 0.8;
  }

  /* Denomination buttons */
  .denom-group {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .denom-btn {
    flex: 1;
    background: rgba(73,80,85,0.3);
    border: 1.5px solid rgba(130,169,56,0.25);
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 1rem 0.5rem;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .denom-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--green);
    transform: scaleX(0);
    transition: transform 0.2s ease;
  }

  .denom-btn:hover {
    border-color: rgba(130,169,56,0.6);
    background: rgba(130,169,56,0.1);
    color: var(--green-bright);
  }

  .denom-btn:hover::after { transform: scaleX(1); }

  .denom-btn.active {
    background: rgba(130,169,56,0.15);
    border-color: var(--green);
    color: var(--green-bright);
    box-shadow: 0 0 20px rgba(130,169,56,0.2), inset 0 0 20px rgba(130,169,56,0.05);
  }

  .denom-btn.active::after { transform: scaleX(1); }

  .denom-label {
    display: block;
    font-size: 0.55rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-top: 2px;
  }

  /* Input area */
  .input-wrap {
    position: relative;
    margin-bottom: 1.5rem;
  }

  .input-field {
    width: 100%;
    background: rgba(15,17,19,0.7);
    border: 1.5px solid rgba(130,169,56,0.2);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 1rem 1.2rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }

  .input-field::-webkit-outer-spin-button,
  .input-field::-webkit-inner-spin-button { -webkit-appearance: none; }

  .input-field::placeholder {
    color: rgba(232,236,240,0.2);
    font-weight: 400;
    font-size: 1rem;
    letter-spacing: 0.05em;
  }

  .input-field:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(130,169,56,0.12);
  }

  /* Verify button */
  .verify-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--green-dim), var(--green));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 1rem;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 20px rgba(130,169,56,0.3);
  }

  .verify-btn:hover {
    background: linear-gradient(135deg, var(--green), var(--green-bright));
    box-shadow: 0 6px 30px rgba(130,169,56,0.45);
    transform: translateY(-1px);
  }

  .verify-btn:active { transform: translateY(0); }

  /* Result area */
  .result-wrap {
    margin-top: 1.75rem;
    border-radius: 10px;
    overflow: hidden;
    display: none;
  }

  .result-wrap.show { display: block; }

  .result-box {
    padding: 1.4rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    border-radius: 10px;
    animation: fadeSlide 0.35s ease;
  }

  .result-box.valid {
    background: rgba(130,169,56,0.12);
    border: 1.5px solid rgba(130,169,56,0.4);
  }

  .result-box.invalid {
    background: rgba(224,68,68,0.1);
    border: 1.5px solid rgba(224,68,68,0.35);
  }

  .result-icon {
    font-size: 1.8rem;
    flex-shrink: 0;
    line-height: 1;
  }

  .result-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    line-height: 1.3;
  }

  .result-box.valid .result-text { color: var(--valid); }
  .result-box.invalid .result-text { color: var(--invalid); }

  .result-sub {
    font-size: 0.75rem;
    font-family: 'Exo 2', sans-serif;
    font-weight: 300;
    letter-spacing: 0.08em;
    margin-top: 0.25rem;
    opacity: 0.7;
  }

  .result-box.valid .result-sub { color: var(--valid); }
  .result-box.invalid .result-sub { color: var(--invalid); }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid rgba(130,169,56,0.1);
    margin: 2rem 0 1.5rem;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: rgba(232,236,240,0.3);
    margin-top: 2rem;
    justify-content: center;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>

          <div class="result-sub" id="result-sub"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot"></div>
    Sistema de verificación activo
  </div>
</div>

<script>
  let selectedDenom = null;

  const ranges = {
    10: [
      [77100001, 77550000],
      [78000001, 78450000],
      [78900001, 96350000],
      [96350001, 96800000],
      [96800001, 97250000],
      [98150001, 98600000],
      [104900001, 105350000],
      [105350001, 105800000],
      [106700001, 107150000],
      [107600001, 108050000],
      [108050001, 108500000],
      [109400001, 109850000],
    ],
    20: [
      [87280145, 91646549],
      [96650001, 97100000],
      [99800001, 100250000],
      [100250001, 100700000],
      [109250001, 109700000],
      [110600001, 111050000],
      [111050001, 111500000],
      [111950001, 112400000],
      [112400001, 112850000],
      [112850001, 113300000],
      [114200001, 114650000],
      [114650001, 115100000],
      [115100001, 115550000],
      [118700001, 119150000],
      [119150001, 119600000],
      [120500000, 120950000],
    ],
    50: [
      [67250001, 67700000],
      [69050001, 69500000],
      [69500001, 69950000],
      [69950001, 70400000],
      [70400001, 70850000],
      [70850001, 71300000],
      [76310012, 85139995],
      [86400001, 86850000],
      [90900001, 91350000],
      [91800001, 92250000],
    ]
  };

  function selectDenom(btn) {
    document.querySelectorAll('.denom-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDenom = parseInt(btn.dataset.value);
    clearResult();
  }

  function clearResult() {
    const wrap = document.getElementById('result');
    wrap.classList.remove('show');
  }

  function verificar() {
    const input = document.getElementById('serial').value.trim();

    if (!selectedDenom) {
      showResult(false, '⚠ Seleccione una denominación', 'Elija 10, 20 o 50 Bs primero.', true);
      return;
    }
    if (!input || isNaN(input)) {
      showResult(false, '⚠ Número inválido', 'Ingrese un número de serie válido.', true);
      return;
    }

    const num = parseInt(input);
    const dRanges = ranges[selectedDenom];
    let noValido = false;

    for (const [desde, hasta] of dRanges) {
      if (num >= desde && num <= hasta) {
        noValido = true;
        break;
      }
    }

    if (noValido) {
      showResult(false, 'No tienen valor legal', `Billete de ${selectedDenom} Bs — Serie: ${num.toLocaleString()}`);
    } else {
      showResult(true, 'Tiene valor legal', `Billete de ${selectedDenom} Bs — Serie: ${num.toLocaleString()}`);
    }
  }

  function showResult(valid, message, sub, warn = false) {
    const wrap = document.getElementById('result');
    const box = document.getElementById('result-box');
    const icon = document.getElementById('result-icon');
    const text = document.getElementById('result-text');
    const subEl = document.getElementById('result-sub');

    box.className = 'result-box ' + (valid ? 'valid' : 'invalid');
    icon.textContent = warn ? '⚠️' : (valid ? '✅' : '🚫');
    text.textContent = message;
    subEl.textContent = sub;
    wrap.classList.add('show');
  }

  // Enter key
  document.getElementById('serial').addEventListener('keydown', e => {
    if (e.key === 'Enter') verificar();
  });
</script>
</body>
</html>
